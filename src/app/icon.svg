<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark navy rounded-square background -->
  <rect width="512" height="512" rx="96" fill="#0D1F35"/>

  <defs>
    <!-- Clip bowl to the right of the stem so the ellipse doesn't bleed left -->
    <clipPath id="bc">
      <rect x="156" y="0" width="400" height="512"/>
    </clipPath>
  </defs>

  <!-- Stem: left vertical bar -->
  <rect x="80" y="80" width="76" height="352" fill="white"/>

  <!-- Bowl: outer ellipse minus counter (inner ellipse), right half only -->
  <g clip-path="url(#bc)">
    <ellipse cx="156" cy="210" rx="180" ry="130" fill="white"/>
    <ellipse cx="156" cy="210" rx="110" ry="64"  fill="#0D1F35"/>
  </g>

  <!--
    Leg: parallelogram starting at the bottom of the counter (y=274)
    Left  edge: (156,274) → (318,432)   slope ≈ 1.03
    Right edge: (250,274) → (412,432)   slope ≈ 1.03  (uniform 94 px wide)
  -->
  <polygon points="156,274 250,274 412,432 318,432" fill="white"/>

  <!-- Teal accent — a "network node" at the tip of the leg -->
  <circle cx="392" cy="416" r="44" fill="#22D3A0"/>
</svg>
